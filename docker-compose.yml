services:
  api:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://database:27017/biblioteca
    depends_on:
      - database

  database:
    image: mongo:latest
    ports: 
     - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: